<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flizzy OS - Cinema Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #020617;
        --accent-cyan: #00f0ff;
        --glass: rgba(15, 23, 42, 0.7);
        --glass-border: rgba(0, 240, 255, 0.2);
        --neon-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Outfit", sans-serif;
        /* Sembunyikan highlight tap di layar sentuh */
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--bg-color);
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(0, 240, 255, 0.05) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(139, 92, 246, 0.05) 0px,
            transparent 50%
          );
        color: white;
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: var(--accent-cyan) var(--bg-color);
        /* Sembunyikan kursor bawaan agar kursor AI yang bekerja */
        cursor: none;
      }

      /* --- NAVIGASI --- */
      nav {
        position: sticky;
        top: 0;
        width: 100%;
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--glass-border);
        background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(10px);
        z-index: 1000;
      }

      .logo-brand {
        font-weight: 800;
        font-size: 1.4rem;
        color: var(--accent-cyan);
        text-shadow: var(--neon-shadow);
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-back {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border: 1px solid rgba(0, 240, 255, 0.36);
        border-radius: 6px;
        color: white;
        background: rgba(0, 240, 255, 0.11);
        font: 800 0.72rem/1 "JetBrains Mono", monospace;
        text-decoration: none;
        transition: 0.2s ease;
      }

      .nav-back:hover,
      .nav-back:focus-visible {
        outline: none;
        border-color: var(--accent-cyan);
        box-shadow: var(--neon-shadow);
      }

      /* --- KATALOG FILM --- */
      .catalog-container {
        padding: 40px;
      }

      .category-title {
        font-weight: 600;
        font-size: 1.5rem;
        margin-bottom: 15px;
        margin-top: 30px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #fff;
      }

      .movie-row {
        display: flex;
        gap: 20px;
        overflow-x: auto;
        padding-bottom: 20px;
      }

      .movie-row::-webkit-scrollbar {
        height: 8px;
      }
      .movie-row::-webkit-scrollbar-thumb {
        background: var(--accent-cyan);
        border-radius: 4px;
      }

      .movie-card {
        min-width: 200px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--glass-border);
        transition: all 0.3s ease;
        cursor: none; /* Pastikan elemen interaktif juga tidak memunculkan kursor bawaan */
        position: relative;
        background: transparent;
        color: white;
        padding: 0;
        appearance: none;
        text-align: left;
      }

      .movie-card img {
        width: 100%;
        display: block;
      }

      .movie-card:hover {
        transform: scale(1.05);
        border-color: var(--accent-cyan);
        box-shadow: var(--neon-shadow);
      }

      .movie-info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.95));
        padding: 20px 10px 10px 10px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .movie-card:hover .movie-info {
        opacity: 1;
      }

      .movie-title {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 5px;
      }
      .movie-rating {
        color: var(--accent-cyan);
        font-family: "JetBrains Mono";
        font-size: 0.8rem;
      }

      /* --- MODAL VIDEO PLAYER --- */
      .video-modal {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(10px);
        z-index: 2000;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }

      .video-container {
        width: 90%;
        max-width: 1000px;
        aspect-ratio: 16/9;
        position: relative;
        background: #000;
        border: 1px solid var(--accent-cyan);
        box-shadow: var(--neon-shadow);
        border-radius: 12px;
        overflow: hidden;
      }

      .close-video {
        position: absolute;
        top: 20px;
        right: 30px;
        background: #ef4444;
        color: white;
        border: none;
        min-width: 144px;
        min-height: 48px;
        padding: 10px 20px;
        font-weight: 800;
        border-radius: 8px;
        font-family: "JetBrains Mono";
        z-index: 2001;
        transition: 0.3s;
        cursor: none; /* AI target */
      }

      .close-video:hover {
        background: #ff0000;
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
      }

      .video-control-panel {
        width: min(90%, 1000px);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 12px;
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.92);
        box-shadow: var(--neon-shadow);
      }

      .video-status {
        color: var(--accent-cyan);
        font: 800 0.72rem/1.3 "JetBrains Mono", monospace;
      }

      .video-buttons {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .player-btn {
        min-width: 92px;
        min-height: 44px;
        border: 1px solid rgba(0, 240, 255, 0.36);
        border-radius: 6px;
        color: white;
        background: rgba(0, 240, 255, 0.11);
        font: 800 0.72rem/1 "JetBrains Mono", monospace;
        transition: 0.2s ease;
      }

      .player-btn:hover,
      .player-btn:focus-visible {
        outline: none;
        border-color: var(--accent-cyan);
        box-shadow: var(--neon-shadow);
      }

      /* --- AI CURSOR & CAMERA HUD --- */
      .camera-hud {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 180px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        padding: 5px;
        border-radius: 12px;
        z-index: 10000;
        box-shadow: var(--neon-shadow);
      }

      .camera-hud video {
        width: 100%;
        border-radius: 8px;
        transform: scaleX(-1);
      }

      #cursor {
        position: fixed;
        width: 32px;
        height: 32px;
        border: 2px solid var(--accent-cyan);
        border-radius: 50%;
        background: rgba(0, 240, 255, 0.1);
        pointer-events: none; /* KRUSIAL: Agar klik tembus ke elemen di bawahnya */
        z-index: 9999999;
        transform: translate(-50%, -50%);
        transition: transform 0.05s linear;
        box-shadow: 0 0 15px var(--accent-cyan);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #cursor::after {
        content: "";
        width: 4px;
        height: 4px;
        background: var(--accent-cyan);
        border-radius: 50%;
      }

      .click-anim {
        transform: translate(-50%, -50%) scale(0.5) !important;
        background: var(--accent-cyan) !important;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo-brand">FLIZZY CINEMA HUB</div>
      <div class="nav-actions">
        <a class="nav-back" href="index.html">BACK</a>
        <div
          style="
            font-family: &quot;JetBrains Mono&quot;;
            font-size: 0.7rem;
            color: var(--accent-cyan);
          "
        >
        
        </div>
      </div>
    </nav>

    <div class="catalog-container" id="app-root"></div>

    <button
      class="close-video"
      id="closeBtn"
      style="display: none"
      onclick="closeTrailer()"
    >
      CLOSE_FEED [X]
    </button>
    <div class="video-modal" id="videoModal">
      <div class="video-container">
        <iframe
          id="trailerFrame"
          src=""
          style="width: 100%; height: 100%; border: none"
          allow="autoplay; encrypted-media"
          allowfullscreen
        ></iframe>
      </div>
      <div class="video-control-panel">
        <div class="video-status" id="videoStatus">TRAILER_READY</div>
        <div class="video-buttons">
          <button class="player-btn" type="button" onclick="sendYouTubeCommand('playVideo', 'TRAILER_PLAYING')">PLAY</button>
          <button class="player-btn" type="button" onclick="sendYouTubeCommand('pauseVideo', 'TRAILER_PAUSED')">PAUSE</button>
          <button class="player-btn" type="button" id="muteBtn" onclick="toggleMute()">MUTE</button>
          <button class="player-btn" type="button" onclick="closeTrailer()">EXIT</button>
        </div>
      </div>
    </div>

    <div class="camera-hud">
      <video id="webcam" autoplay playsinline></video>
      <div
        class="flizzy-camera-label"
        style="
          font-family: &quot;JetBrains Mono&quot;;
          font-size: 9px;
          text-align: center;
          margin-top: 5px;
          color: var(--accent-cyan);
        "
      >
        FACE_ENGINE
      </div>
    </div>

    <div id="cursor"></div>

    <script type="module" src="/src/main.ts"></script>

    <script>
      const API_KEY = "275177671924d407e3a6b3a57029cb46"; // GANTI DENGAN KUNCI TMDB ANDA
      const BASE_URL = "https://api.themoviedb.org/3";
      const IMG_URL = "https://image.tmdb.org/t/p/w500";

      const endpoints = [
        {
          title: "TRENDING NOW",
          url: `/trending/movie/week?api_key=${API_KEY}`,
        },
        {
          title: "CYBERPUNK & SCI-FI",
          url: `/discover/movie?api_key=${API_KEY}&with_genres=878`,
        },
        {
          title: "ACTION PROTOCOLS",
          url: `/discover/movie?api_key=${API_KEY}&with_genres=28`,
        },
        {
          title: "HORROR ARCHIVES",
          url: `/discover/movie?api_key=${API_KEY}&with_genres=27`,
        },
      ];

      const appRoot = document.getElementById("app-root");
      const vModal = document.getElementById("videoModal");
      const vFrame = document.getElementById("trailerFrame");
      const closeBtn = document.getElementById("closeBtn");
      const videoStatus = document.getElementById("videoStatus");
      const muteBtn = document.getElementById("muteBtn");
      let isMuted = false;

      async function fetchMovies() {
        for (const category of endpoints) {
          try {
            const response = await fetch(BASE_URL + category.url);
            const data = await response.json();
            renderRow(category.title, data.results);
          } catch (error) {
            console.error("Link error:", error);
          }
        }
      }

      function renderRow(title, movies) {
        const categoryEl = document.createElement("h2");
        categoryEl.className = "category-title";
        categoryEl.innerText = `${title}`;

        const rowEl = document.createElement("div");
        rowEl.className = "movie-row";

        movies.forEach((movie) => {
          if (!movie.poster_path) return;

          const card = document.createElement("button");
          card.className = "movie-card";
          card.type = "button";
          card.setAttribute("aria-label", `Open trailer for ${movie.title}`);
          card.innerHTML = `
                    <img src="${IMG_URL + movie.poster_path}" alt="${movie.title}">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-rating">RATING: ${movie.vote_average.toFixed(1)}/10</div>
                    </div>
                `;

          card.addEventListener("click", () => {
            fetchTrailer(movie.id);
          });

          rowEl.appendChild(card);
        });

        appRoot.appendChild(categoryEl);
        appRoot.appendChild(rowEl);
      }

      async function fetchTrailer(movieId) {
        try {
          const response = await fetch(
            `${BASE_URL}/movie/${movieId}/videos?api_key=${API_KEY}`,
          );
          const data = await response.json();

          const trailer = data.results.find(
            (vid) => vid.site === "YouTube" && vid.type === "Trailer",
          );

          if (trailer) {
            playTrailer(trailer.key);
          } else {
            alert(
              "System Error: No visual data (trailer) found for this protocol.",
            );
          }
        } catch (error) {
          console.error("Gagal mengambil trailer:", error);
        }
      }

      function playTrailer(youtubeKey) {
        const origin = encodeURIComponent(window.location.origin);
        vFrame.src = `https://www.youtube.com/embed/${youtubeKey}?autoplay=1&controls=1&modestbranding=1&enablejsapi=1&origin=${origin}`;
        vModal.style.display = "flex";
        closeBtn.style.display = "block";
        videoStatus.innerText = "TRAILER_PLAYING";
        isMuted = false;
        muteBtn.innerText = "MUTE";
      }

      function closeTrailer() {
        sendYouTubeCommand("stopVideo", "TRAILER_STOPPED");
        vModal.style.display = "none";
        closeBtn.style.display = "none";
        vFrame.src = "";
        videoStatus.innerText = "TRAILER_READY";
      }

      function sendYouTubeCommand(command, statusText) {
        if (!vFrame.contentWindow) return;
        vFrame.contentWindow.postMessage(JSON.stringify({
          event: "command",
          func: command,
          args: []
        }), "*");
        if (statusText) videoStatus.innerText = statusText;
      }

      function toggleMute() {
        isMuted = !isMuted;
        sendYouTubeCommand(isMuted ? "mute" : "unMute", isMuted ? "TRAILER_MUTED" : "TRAILER_AUDIO_ON");
        muteBtn.innerText = isMuted ? "UNMUTE" : "MUTE";
      }

      // Inisialisasi
      fetchMovies();
    </script>
  </body>
</html>
