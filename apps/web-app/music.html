<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flizzy OS - Audio Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020617;
            --accent-cyan: #00f0ff;
            --accent-purple: #8b5cf6;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(0, 240, 255, 0.2);
            --neon-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-cyan) var(--bg-color);
        }

        /* Navigasi */
        nav {
            width: 100%; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo-brand {
            font-weight: 800; font-size: 1.4rem;
            color: var(--accent-purple); 
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-back {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            border: 1px solid rgba(139, 92, 246, 0.42);
            border-radius: 6px;
            color: white;
            background: rgba(139, 92, 246, 0.14);
            font: 800 0.72rem/1 'JetBrains Mono', monospace;
            text-decoration: none;
            transition: 0.2s ease;
        }

        .nav-back:hover,
        .nav-back:focus-visible {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.34);
        }

        /* Area Konten Utama */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 40px 140px 40px; 
        }

        .category-title {
            font-weight: 600; font-size: 1.5rem;
            margin: 30px 0 15px 0;
            text-transform: uppercase; letter-spacing: 1px;
            color: #fff;
        }

        .track-row {
            display: flex; gap: 20px;
            overflow-x: auto; padding-bottom: 20px;
        }

        .track-row::-webkit-scrollbar { height: 8px; }
        .track-row::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 4px; }

        /* Kartu Lagu */
        .track-card {
            min-width: 160px; max-width: 160px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 15px;
            transition: all 0.3s ease;
            text-align: center;
            color: white;
            appearance: none;
            cursor: none;
        }

        .track-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .track-art {
            width: 100%; aspect-ratio: 1/1;
            border-radius: 8px; margin-bottom: 10px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .track-title { font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: var(--accent-cyan); font-size: 0.8rem; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- BOTTOM PLAYER --- */
        .bottom-player {
            position: fixed; bottom: 0; left: 0; right: 0;
            min-height: 112px;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px;
            z-index: 2000;
        }

        .now-playing { display: flex; align-items: center; gap: 15px; width: 30%; }
        .np-art { width: 50px; height: 50px; border-radius: 5px; background: #222; }
        .np-info { display: flex; flex-direction: column; }
        .np-title { font-weight: 700; font-size: 1rem; color: white; }
        .np-artist { font-size: 0.8rem; color: var(--accent-cyan); }

        .player-controls {
            display: flex; flex-direction: column; align-items: center; gap: 10px; width: 40%;
        }

        audio { display: none; }

        .play-status {
            font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--accent-purple);
            margin-bottom: 5px; letter-spacing: 2px;
        }

        .visualizer {
            display: flex; gap: 3px; align-items: flex-end; height: 20px;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .player-btn {
            min-width: 92px;
            min-height: 44px;
            border: 1px solid rgba(139, 92, 246, 0.48);
            border-radius: 6px;
            color: white;
            background: rgba(139, 92, 246, 0.16);
            font: 800 0.72rem/1 'JetBrains Mono', monospace;
            transition: 0.2s ease;
        }

        .player-btn:hover,
        .player-btn:focus-visible {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.34);
        }

        .system-note {
            width: 30%;
            text-align: right;
            color: var(--glass-border);
            font-size: 0.8rem;
        }
        
        .bar {
            width: 4px; background: var(--accent-purple);
            animation: bounce 0.5s infinite alternate;
        }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes bounce {
            from { height: 5px; }
            to { height: 20px; }
        }

        /* --- AI CURSOR & CAMERA HUD --- */
        .camera-hud {
            position: fixed; bottom: 110px; /* Dinaikkan sedikit agar tidak tertutup player bawah */
            right: 30px;
            width: 150px; background: var(--glass);
            border: 1px solid var(--accent-purple);
            padding: 5px; border-radius: 12px;
            z-index: 10000;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .camera-hud video {
            width: 100%; border-radius: 8px;
            transform: scaleX(-1);
        }

        #cursor {
            position: fixed;
            width: 32px; height: 32px;
            border: 2px solid var(--accent-purple);
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.2);
            pointer-events: none; /* Penting agar klik bisa tembus ke elemen di bawahnya */
            z-index: 9999999; 
            transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
            box-shadow: 0 0 15px var(--accent-purple);
            display: flex; align-items: center; justify-content: center;
        }

        #cursor::after {
            content: ''; width: 4px; height: 4px;
            background: var(--accent-purple); border-radius: 50%;
        }

        .click-anim {
            transform: translate(-50%, -50%) scale(0.5) !important;
            background: var(--accent-purple) !important;
        }

        /* Sembunyikan kursor mouse default */
        a, button, .track-card, body { cursor: none !important; }

    </style>
</head>
<body>

    <nav>
        <div class="logo-brand">FLIZZY AUDIO HUB</div>
        <div class="nav-actions">
            <a class="nav-back" href="index.html">BACK</a>
            <div style="font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--accent-purple);">
                DATA_LINK: ITUNES_API_ACTIVE
            </div>
        </div>
    </nav>

    <div class="main-content" id="app-root">
        </div>

    <div class="bottom-player">
        <div class="now-playing">
            <img src="" class="np-art" id="np-art" alt="">
            <div class="np-info">
                <span class="np-title" id="np-title">SYSTEM_STANDBY</span>
                <span class="np-artist" id="np-artist">Awaiting Input...</span>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="play-status" id="play-status">AUDIO_OFFLINE</div>
            <div class="control-buttons">
                <button class="player-btn" id="toggle-audio" type="button">PLAY</button>
                <button class="player-btn" id="stop-audio" type="button">STOP</button>
            </div>
            <div class="visualizer" id="visualizer" style="display: none;">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>
        
        <audio id="audio-engine" controls></audio>
        
        <div class="system-note">
            30_SEC_PREVIEW
        </div>
    </div>

    <div class="camera-hud">
        <video id="webcam" autoplay playsinline></video>
        <div class="flizzy-camera-label" style="font-family: 'JetBrains Mono'; font-size: 9px; text-align: center; margin-top: 5px; color: var(--accent-purple);">
            FACE_ENGINE
        </div>
    </div>

    <div id="cursor"></div>

    <script type="module" src="/src/main.ts"></script>

    <script>
        const appRoot = document.getElementById('app-root');
        const audioEngine = document.getElementById('audio-engine');
        const npArt = document.getElementById('np-art');
        const npTitle = document.getElementById('np-title');
        const npArtist = document.getElementById('np-artist');
        const playStatus = document.getElementById('play-status');
        const visualizer = document.getElementById('visualizer');
        const toggleAudio = document.getElementById('toggle-audio');
        const stopAudio = document.getElementById('stop-audio');

        const categories = [
            { title: "SYNTHWAVE & CYBERPUNK", query: "synthwave" },
            { title: "LO-FI BEATS", query: "lofi hip hop" },
            { title: "INDONESIAN HITS", query: "indonesia pop" }
        ];

        async function fetchMusic() {
            for (const category of categories) {
                try {
                    const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(category.query)}&media=music&entity=song&limit=15`);
                    const data = await response.json();
                    renderRow(category.title, data.results);
                } catch (error) {
                    console.error("Link error:", error);
                }
            }
        }

        function renderRow(title, tracks) {
            const categoryEl = document.createElement('h2');
            categoryEl.className = 'category-title';
            categoryEl.innerText = `${title}`;
            
            const rowEl = document.createElement('div');
            rowEl.className = 'track-row';

            tracks.forEach(track => {
                if (!track.previewUrl) return; 
                
                const highResImage = track.artworkUrl100.replace('100x100bb', '300x300bb');

                const card = document.createElement('button');
                card.className = 'track-card';
                card.type = 'button';
                card.setAttribute('aria-label', `Play ${track.trackName} by ${track.artistName}`);
                card.innerHTML = `
                    <img src="${highResImage}" class="track-art" alt="Cover">
                    <div class="track-title">${track.trackName}</div>
                    <div class="track-artist">${track.artistName}</div>
                `;
                
                // EVENT KLIK UNTUK AI
                card.addEventListener('click', () => {
                    playTrack(track.previewUrl, track.trackName, track.artistName, highResImage);
                });

                rowEl.appendChild(card);
            });

            appRoot.appendChild(categoryEl);
            appRoot.appendChild(rowEl);
        }

        function playTrack(audioUrl, title, artist, imgUrl) {
            npTitle.innerText = title;
            npArtist.innerText = artist;
            npArt.src = imgUrl;
            
            audioEngine.src = audioUrl;
            audioEngine.play().catch(() => {
                playStatus.innerText = "CLICK_PLAY_REQUIRED";
                playStatus.style.color = "var(--accent-purple)";
            });

            playStatus.innerText = "NOW_PLAYING";
            playStatus.style.color = "var(--accent-cyan)";
            visualizer.style.display = "flex";
            toggleAudio.innerText = "PAUSE";
        }

        function togglePlayback() {
            if (!audioEngine.src) {
                playStatus.innerText = "SELECT_TRACK";
                return;
            }

            if (audioEngine.paused) {
                audioEngine.play().then(() => {
                    playStatus.innerText = "NOW_PLAYING";
                    playStatus.style.color = "var(--accent-cyan)";
                    visualizer.style.display = "flex";
                    toggleAudio.innerText = "PAUSE";
                }).catch(() => {
                    playStatus.innerText = "CLICK_PLAY_REQUIRED";
                });
            } else {
                audioEngine.pause();
                playStatus.innerText = "AUDIO_PAUSED";
                playStatus.style.color = "var(--accent-purple)";
                visualizer.style.display = "none";
                toggleAudio.innerText = "PLAY";
            }
        }

        function stopPlayback() {
            audioEngine.pause();
            audioEngine.currentTime = 0;
            playStatus.innerText = audioEngine.src ? "AUDIO_STOPPED" : "SELECT_TRACK";
            playStatus.style.color = "var(--accent-purple)";
            visualizer.style.display = "none";
            toggleAudio.innerText = "PLAY";
        }

        audioEngine.addEventListener('ended', () => {
            playStatus.innerText = "AUDIO_STANDBY";
            playStatus.style.color = "var(--accent-purple)";
            visualizer.style.display = "none";
            toggleAudio.innerText = "PLAY";
        });

        audioEngine.addEventListener('pause', () => {
            if (!audioEngine.ended) toggleAudio.innerText = "PLAY";
        });

        audioEngine.addEventListener('play', () => {
            toggleAudio.innerText = "PAUSE";
        });

        toggleAudio.addEventListener('click', togglePlayback);
        stopAudio.addEventListener('click', stopPlayback);

        fetchMusic();
    </script>
</body>
</html>
